{% extends "base.html" %}

{% block content %}
  <div class="command-section">
    <fieldset>
      <legend>Inspect GONet Images</legend>
      <button onclick="location.href='/cmd/show'">Show Image</button>
      <button onclick="location.href='/cmd/show_meta'">Show Metadata</button>
      <button onclick="location.href='/cmd/extract'">Extract Region</button>
    </fieldset>

    <fieldset>
      <legend>Launch Dashboard</legend>
      <button onclick="location.href='/cmd/dashboard'">Open Dashboard</button>
    </fieldset>

    <fieldset>
      <legend>Control GONet Camera</legend>
      <button onclick="location.href='/cmd/connect_snap'">Snap Image</button>
      <button onclick="location.href='/cmd/connect_terminate'">Terminate Imaging</button>
    </fieldset>
  </div>

  <form id="args-form" onsubmit="submitForm(event)">
    <!-- Command-specific form will be inserted here -->
  </form>

  <pre id="output"></pre>
{% endblock %}
