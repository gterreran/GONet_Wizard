# ------------------------------------------------------------------------------
# GONet Field Specification Registry
#
# This file defines the canonical set of fields used in GONet data extractors,
# visualizations, and processing modules. Each field contains:
#   - key:         The internal identifier used in code and data outputs
#   - label:       A human-readable name for display or plotting
#   - unit:        A display-only string representing the physical unit
#   - aliases:     (Optional) Legacy or alternative names used for backward compatibility
#
# NOTE:
#   - The top-level dictionary keys (e.g., "filename", "camera", etc.) are *fixed*.
#     These keys are used across the codebase to reference fields and SHOULD NOT
#     be renamed.
#   - The `key` attribute inside each field object may be edited freely and is
#     treated independently from the dictionary key.
# ------------------------------------------------------------------------------

filename:
  key: filename
  label: Filename
  unit: ''

camera:
  key: camera
  label: Camera
  unit: ''

unix_time:
  key: unix_time
  label: Unix Time
  unit: s
  aliases: [time]

night:
  key: night
  label: Night
  unit: ''

date_utc:
  key: date_utc
  label: Date UTC
  unit: ISO 8601
  aliases: [date]

date_local:
  key: date_local
  label: Date Local
  unit: ISO 8601

mjd:
  key: mjd
  label: Modified Julian Date
  unit: days

hours_utc:
  key: hours_utc
  label: Hours UTC
  unit: HH:MM:SS

hours_local:
  key: hours_local
  label: Hours Local
  unit: HH:MM:SS

float_hours_utc:
  key: float_hours_utc
  label: Float Hours UTC
  unit: fraction of day

float_hours_local:
  key: float_hours_local
  label: Float Hours Local
  unit: fraction of day

sunaltaz:
  key: sunaltaz
  label: Sun AltAz
  unit: degrees

moonaltaz:
  key: moonaltaz
  label: Moon AltAz
  unit: degrees

moon_illumination:
  key: moon_illumination
  label: Moon Illumination
  unit: '%'

temperature:
  key: temperature
  label: Temperature
  unit: °C

dew_point:
  key: dew_point
  label: Dew Point
  unit: °C

wind_speed:
  key: wind_speed
  label: Wind Speed
  unit: m/s

pressure:
  key: pressure
  label: Pressure
  unit: hPa

humidity:
  key: humidity
  label: Humidity
  unit: '%'

condition_code:
  key: condition_code
  label: Condition Code
  unit: ''

x0:
  key: x0
  label: Center X
  unit: pixels

y0:
  key: y0
  label: Center Y
  unit: pixels

radius:
  key: radius
  label: Radius
  unit: pixels

side1:
  key: side1
  label: Side 1
  unit: pixels

side2:
  key: side2
  label: Side 2
  unit: pixels

inner_radius:
  key: inner_radius
  label: Inner Radius
  unit: pixels

outer_radius:
  key: outer_radius
  label: Outer Radius
  unit: pixels

start_angle:
  key: start_angle
  label: Start Angle
  unit: degrees

end_angle:
  key: end_angle
  label: End Angle
  unit: degrees

path:
  key: path
  label: SVG Path
  unit: ''

total_counts:
  key: total_counts
  label: Total Counts
  unit: counts

mean_counts:
  key: mean_counts
  label: Mean Counts
  unit: counts

std:
  key: std
  label: Standard Deviation
  unit: counts

npixels:
  key: npixels
  label: Number of Pixels
  unit: pixels
