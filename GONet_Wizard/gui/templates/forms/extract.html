<div class="form-group"><input name="filenames" placeholder="*.tiff or comma-separated"></div>
<div class="form-group"><input type="checkbox" name="red"> Red</div>
<div class="form-group"><input type="checkbox" name="green"> Green</div>
<div class="form-group"><input type="checkbox" name="blue"> Blue</div>
<div class="form-group"><input name="shape" placeholder="circle, rectangle, annulus, etc."></div>
<div class="form-group"><input name="center" placeholder="x,y center"></div>
<div class="form-group"><input name="radius" placeholder="Radius (circle)"></div>
<div class="form-group"><input name="sides" placeholder="x,y (rectangle)"></div>
<div class="form-group"><input name="inner_radius" placeholder="Inner radius (annulus)"></div>
<div class="form-group"><input name="outer_radius" placeholder="Outer radius (annulus)"></div>
<div class="form-group"><input name="angles" placeholder="Start,end (default -180,180)"></div>
<div class="form-group"><input name="output" placeholder="Output filename"></div>
<button type="submit">Run extract</button>
