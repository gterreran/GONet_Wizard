{% extends "base.html" %}

{% block footer %}
  <!-- Empty block - footer content from base.html will not be rendered -->
  <script>
    async function gonetPickSavePath(data) {
      let path = '';
      try {
        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.pick_save_path === 'function') {
          path = await window.pywebview.api.pick_save_path(
            data.default_name || 'gonet_output.pdf',
            data.file_types || null
          );
        }
      } catch (err) {
        path = '';
      }

      try {
        if (data.sourceWindow) {
          data.sourceWindow.postMessage({
            type: 'gonet-save-path-result',
            request_id: data.request_id || '',
            path: path || '',
          }, '*');
        }
      } catch (err) {}
    }

    window.addEventListener('message', function(event) {
      const data = event.data || {};

      if (data.type === 'gonet-pick-save-path') {
        gonetPickSavePath({ ...data, sourceWindow: event.source });
        return;
      }

      if (data.type !== 'gonet-close-window') return;
      try {
        if (window.pywebview && window.pywebview.api) {
          if (typeof window.pywebview.api.close_named_window === 'function') {
            window.pywebview.api.close_named_window(data.key || '{{ channel }}');
            return;
          }
          if (typeof window.pywebview.api.close_window === 'function') {
            window.pywebview.api.close_window();
          }
        }
      } catch (err) {}
    });
  </script>

{% endblock %}

{% block content %}
  <div style="
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
  ">
    <h2 style="margin: 0;">{{ title }}</h2>

  </div>

  <div style="
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
  ">
    <iframe
      id="preview-frame"
      src="/view/{{ channel }}/raw?t={{ range(1)|random }}"
      style="
        width: 100%;
        height: 80vh;
        border: none;
        background-color: #000;
      "
    ></iframe>
  </div>


{% endblock %}
