{% extends "base.html" %}

{% block footer %}
  <!-- Empty block - footer content from base.html will not be rendered -->
{% endblock %}

{% block content %}
  <div style="
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
  ">
    <h2 style="margin: 0;">{{ title }}</h2>

  </div>

  <div style="
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
  ">
    <iframe
      id="preview-frame"
      src="/view/{{ channel }}/raw?t={{ range(1)|random }}"
      style="
        width: 100%;
        height: 80vh;
        border: none;
        background-color: #000;
      "
    ></iframe>
  </div>

  <script>
    window.addEventListener('message', function(event) {
      const data = event.data || {};
      if (data.type !== 'gonet-close-window') return;
      const key = data.key || '{{ channel }}';
      try {
        if (window.pywebview && window.pywebview.api) {
          if (typeof window.pywebview.api.close_named_window === 'function') {
            window.pywebview.api.close_named_window(key);
            return;
          }
          if (typeof window.pywebview.api.close_window === 'function') {
            window.pywebview.api.close_window();
          }
        }
      } catch (err) {}
    });
  </script>

{% endblock %}
